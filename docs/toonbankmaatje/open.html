<!doctype html>
<html lang="nl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Toonbankmaatje starten</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#edf1ee;color:#17201c;font-family:Arial,Helvetica,sans-serif;padding:18px}.card{width:min(100%,420px);background:#fff;border:1px solid #dbe2dd;border-radius:18px;padding:22px;box-shadow:0 18px 60px rgba(23,32,28,.14)}.label{margin:0 0 6px;color:#245f86;font-size:.78rem;font-weight:800;text-transform:uppercase}h1{font-size:1.35rem;margin:0 0 10px}p{line-height:1.45}label{display:grid;gap:7px;font-weight:700;margin-top:14px}input{min-height:46px;border:1px solid #dbe2dd;border-radius:8px;padding:12px;font:inherit}button{width:100%;min-height:46px;margin-top:12px;border:0;border-radius:8px;background:#2f7d4f;color:#fff;font:inherit;font-weight:700}.err{min-height:22px;color:#b3413d;font-weight:700}</style></head>
<body><section class="card"><p class="label">Pilot toegang</p><h1>Toolkit Gezonde Voeding Start</h1><p>Deze starttool is bedoeld voor deelnemers aan de pilot. Vul de toegangscode in om Toonbankmaatje te openen.</p><label>Toegangscode<input id="access" autocomplete="off" placeholder="Vul code in"></label><button id="open">Open Toonbankmaatje</button><p class="err" id="err"></p></section><script>function openApp(){var v=document.getElementById('access').value.trim().toLowerCase();if(v==='toonbank'){sessionStorage.ok='1';location.href='index.html'}else{document.getElementById('err').textContent='Deze code klopt niet. Vraag de pilotbegeleider om de juiste code.'}}document.getElementById('open').onclick=openApp;document.getElementById('access').addEventListener('keydown',function(e){if(e.key==='Enter')openApp()});</script></body></html>
