name: Publish updated Toonbankmaatje to docs
on:
  push:
    paths:
      - .github/workflows/publish-to-docs.yml
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy current app and photo to published folder
        run: |
          mkdir -p docs/toonbankmaatje
          cp toonbankmaatje/app.html docs/toonbankmaatje/app.html
          cp toonbankmaatje/intro-fixed.jpg docs/toonbankmaatje/intro-fixed.jpg
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/toonbankmaatje/app.html')
          text = path.read_text(encoding='utf-8')
          text = text.replace('https://yvonbemelman.github.io/condor-prp-demo/toonbankmaatje/intro-fixed.jpg?v=4', 'intro-fixed.jpg?v=5')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit published files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/toonbankmaatje/app.html docs/toonbankmaatje/intro-fixed.jpg
          git diff --cached --quiet || git commit -m "Publish updated Toonbankmaatje with photo and smarter checks"
          git push
