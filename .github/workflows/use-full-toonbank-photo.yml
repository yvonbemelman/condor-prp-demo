name: Use full Toonbankmaatje photo

on:
  push:
    paths:
      - '.github/workflows/use-full-toonbank-photo.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update photo in both app files
        run: |
          python - <<'PY'
          from pathlib import Path
          for name in ['docs/toonbankmaatje/app.html', 'toonbankmaatje/app.html']:
              path = Path(name)
              text = path.read_text(encoding='utf-8')
              text = text.replace('aspect-ratio:16/9', 'aspect-ratio:4/3')
              text = text.replace('src="intro-fixed.jpg?v=5"', 'src="intro-full.jpg?v=6"')
              text = text.replace('src="https://yvonbemelman.github.io/condor-prp-demo/toonbankmaatje/intro-fixed.jpg?v=4"', 'src="intro-full.jpg?v=6"')
              path.write_text(text, encoding='utf-8')
          PY
      - name: Commit update
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/toonbankmaatje/app.html toonbankmaatje/app.html
          git diff --cached --quiet || git commit -m 'Show full Toonbankmaatje photo on existing app link'
          git push
