name: Update Toonbankmaatje input filter

on:
  push:
    paths:
      - '.github/workflows/filter-onzinvragen.yml'

permissions:
  contents: write

jobs:
  update-filter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add off-topic and inappropriate language checks
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('toonbankmaatje/app.html')
          text = path.read_text(encoding='utf-8')
          old = "if(/(.)\\1{4,}/.test(t)||['asdf','qwerty','bla bla','blabla','test test','onzin','poep','lalala','xyzxyz'].some(x=>t.includes(x)))return'Deze invoer lijkt geen echte product- of klantvraag. Probeer bijvoorbeeld: Waarom kiezen jullie dit product?';if(words.length>2&&new Set(words).size===1)return'Dezelfde woorden worden steeds herhaald. Stel één concrete vraag.';"
          new = "if(/(.)\\1{4,}/.test(t)||['asdf','qwerty','bla bla','blabla','test test','onzin','poep','lalala','xyzxyz'].some(x=>t.includes(x)))return'Deze invoer lijkt geen echte product- of klantvraag. Probeer bijvoorbeeld: Waarom kiezen jullie dit product?';if(['ik vind jou stom','jij bent stom','je bent stom','jij bent dom','je bent dom','idioot','sukkel','achterlijk','rot op','hou je mond','lelijk','irritant'].some(x=>t.includes(x)))return'Deze zin gaat niet over een product of klantgesprek. Oefen bijvoorbeeld: Waarom kiezen jullie voor dit product?';if(['hoe laat is het','wat is het weer','wie is de koning','voetbalwedstrijd','vertel een mop','wat is de hoofdstad','hoe oud ben je'].some(x=>t.includes(x)))return'Deze vraag valt buiten het Toonbankmaatje. Stel een vraag over het product, de bereiding, herkomst, prijs of het gebruik.';if(words.length>2&&new Set(words).size===1)return'Dezelfde woorden worden steeds herhaald. Stel één concrete vraag.';"
          if old not in text:
              raise SystemExit('Expected filter code was not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit update
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add toonbankmaatje/app.html
          git commit -m 'Filter off-topic and inappropriate Toonbankmaatje input'
          git push
