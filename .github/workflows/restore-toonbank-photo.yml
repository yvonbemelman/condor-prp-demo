name: Restore Toonbankmaatje web photo
on:
  push:
    paths:
      - .github/workflows/restore-toonbank-photo.yml
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use stable absolute image address
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('toonbankmaatje/app.html')
          text = path.read_text(encoding='utf-8')
          text = text.replace('src="intro-fixed.jpg?v=3"', 'src="https://yvonbemelman.github.io/condor-prp-demo/toonbankmaatje/intro-fixed.jpg?v=4"')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit restored photo link
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add toonbankmaatje/app.html
          git diff --cached --quiet || git commit -m "Restore Toonbankmaatje web photo"
          git push
