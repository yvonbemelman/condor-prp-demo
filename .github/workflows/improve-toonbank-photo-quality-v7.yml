name: Improve Toonbankmaatje photo quality v7

on:
  push:
    paths:
      - '.github/workflows/improve-toonbank-photo-quality-v7.yml'

permissions:
  contents: write

jobs:
  improve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install image tools
        run: sudo apt-get update && sudo apt-get install -y imagemagick
      - name: Improve full photo for mobile screens
        run: |
          convert docs/toonbankmaatje/intro-full.jpg \
            -filter Lanczos -resize 1200x900 \
            -colorspace Lab -channel 0 -unsharp 0x0.65+0.55+0.015 +channel \
            -colorspace sRGB -sampling-factor 4:4:4 -quality 90 \
            docs/toonbankmaatje/intro-full-v7.jpg
          cp docs/toonbankmaatje/intro-full-v7.jpg toonbankmaatje/intro-full-v7.jpg
          python - <<'PY'
          from pathlib import Path
          for name in ['docs/toonbankmaatje/app.html', 'toonbankmaatje/app.html']:
              path = Path(name)
              text = path.read_text(encoding='utf-8').replace('intro-full.jpg?v=6', 'intro-full-v7.jpg?v=7')
              path.write_text(text, encoding='utf-8')
          PY
      - name: Commit improved photo
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/toonbankmaatje/app.html docs/toonbankmaatje/intro-full-v7.jpg toonbankmaatje/app.html toonbankmaatje/intro-full-v7.jpg
          git diff --cached --quiet || git commit -m 'Improve Toonbankmaatje photo sharpness'
          git push
