name: Fix Toonbankmaatje photo display

on:
  push:
    paths:
      - '.github/workflows/fix-toonbankmaatje-photo.yml'

permissions:
  contents: write

jobs:
  fix-photo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show the complete photo without cropping
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('toonbankmaatje/app.html')
          text = path.read_text(encoding='utf-8')
          old = '.intro{display:block;width:100%;aspect-ratio:4/2.15;object-fit:cover;object-position:center;border:1px solid #d7dfda;border-radius:12px;margin:0 0 12px;background:#fff}'
          new = '.intro{display:block;width:100%;height:auto;aspect-ratio:4/3;object-fit:contain;object-position:center;border:1px solid #d7dfda;border-radius:12px;margin:0 0 12px;background:#fff}'
          if old not in text:
              raise SystemExit('Expected photo style was not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit update
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add toonbankmaatje/app.html
          git commit -m 'Show complete Toonbankmaatje photo without cropping'
          git push
